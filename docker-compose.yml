services:
  banco:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novaris}
      POSTGRES_USER: ${POSTGRES_USER:-novaris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novaris_local_only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-novaris} -d ${POSTGRES_DB:-novaris}
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - novaris

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://novaris:novaris_local_only@banco:5432/novaris}
      SECRET_KEY: ${SECRET_KEY:-}
      PAYMENT_ENCRYPTION_KEY: ${PAYMENT_ENCRYPTION_KEY:-}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-30}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-30}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-*}"
      LOCAL_SECRET_FILE: /app/.novaris-secrets/secret
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENABLE_DOCS: ${ENABLE_DOCS:-true}
      RUN_DATABASE_SETUP_ON_STARTUP: ${RUN_DATABASE_SETUP_ON_STARTUP:-true}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_secrets:/app/.novaris-secrets
    depends_on:
      banco:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - novaris

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - novaris

volumes:
  postgres_data:
  backend_secrets:

networks:
  novaris:
