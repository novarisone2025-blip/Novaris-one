databases:
  - name: novaris-one-postgres
    databaseName: novaris
    user: novaris
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  - type: web
    name: novaris-one-api
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    preDeployCommand: >-
      python -m scripts.inicializar_banco &&
      python -m scripts.validar_banco
    domains:
      - api.novarisone.com.br
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: "1.1.0"
      - key: DATABASE_URL
        fromDatabase:
          name: novaris-one-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PAYMENT_ENCRYPTION_KEY
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_DAYS
        value: "30"
      - key: FRONTEND_URL
        value: https://app.novarisone.com.br
      - key: PUBLIC_API_URL
        value: https://api.novarisone.com.br
      - key: ALLOWED_ORIGINS
        value: https://app.novarisone.com.br,https://novarisone.com.br
      - key: ALLOWED_HOSTS
        value: api.novarisone.com.br,*.onrender.com,localhost,127.0.0.1
      - key: COOKIE_DOMAIN
        value: .novarisone.com.br
      - key: ENABLE_DOCS
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "false"
      - key: RUN_DATABASE_SETUP_ON_STARTUP
        value: "false"
      - key: WEB_CONCURRENCY
        value: "1"
