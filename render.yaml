databases:
  - name: novaris-one-postgres
    databaseName: novaris
    user: novaris
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: novaris-one-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    domains:
      - api.novarisone.com.br
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: "1.1.0"
      - key: DATABASE_URL
        fromDatabase:
          name: novaris-one-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PAYMENT_ENCRYPTION_KEY
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_DAYS
        value: "30"
      - key: FRONTEND_URL
        value: https://novaris-one-web.onrender.com
      - key: PUBLIC_API_URL
        value: https://novaris-one-api.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://novaris-one-web.onrender.com,https://novaris-one.vercel.app,https://app.novarisone.com.br,https://novarisone.com.br
      - key: ALLOWED_HOSTS
        value: novaris-one-api.onrender.com,api.novarisone.com.br,*.onrender.com,localhost,127.0.0.1
      - key: ENABLE_DOCS
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "false"
      - key: RUN_DATABASE_SETUP_ON_STARTUP
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"

  - type: web
    name: novaris-one-web
    runtime: static
    rootDir: frontend
    buildCommand: pnpm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://novaris-one-api.onrender.com
